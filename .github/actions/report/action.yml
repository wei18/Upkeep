name: upkeep report
description: Consolidate findings + synthesis into HTML (artifact) and upsert a tracking issue.
inputs:
  target:
    default: '.'
  issue_label:
    default: audit
  github_token:
    required: true
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: '20'
    - name: install upkeep deps
      shell: bash
      working-directory: ${{ github.action_path }}/../../..
      run: npm ci
    - uses: actions/download-artifact@v8
      with:
        pattern: findings-*
        path: ${{ inputs.target }}/findings
        merge-multiple: true
    - uses: actions/download-artifact@v8
      with:
        name: synthesis
        path: ${{ inputs.target }}
      continue-on-error: true
    - uses: actions/download-artifact@v8
      with:
        name: inventory
        path: ${{ inputs.target }}
      continue-on-error: true
    - name: render report
      shell: bash
      env:
        UPKEEP_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail
        ROOT="${{ github.action_path }}/../../.."
        SYN="${{ inputs.target }}/synthesis.json"
        [ -f "$SYN" ] || SYN="-"
        "$ROOT/node_modules/.bin/tsx" "$ROOT/src/report.ts" \
          "${{ inputs.target }}/findings" "$SYN" \
          "${{ runner.temp }}/report.html" "${{ runner.temp }}/issue.md" \
          "${{ inputs.target }}/inventory.json"
    - uses: actions/upload-artifact@v7
      with:
        name: report-html
        path: ${{ runner.temp }}/report.html
    - name: add artifact expiry to the issue (best-effort)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        UPKEEP_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail
        ROOT="${{ github.action_path }}/../../.."
        # expires_at comes from the uploaded artifact = the repo's effective gh retention setting
        EXP="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
          --jq '[.artifacts[] | select(.name=="report-html")][0].expires_at' 2>/dev/null || true)"
        [ -n "${EXP:-}" ] && [ "$EXP" != "null" ] || exit 0   # keep the run-link-only issue if unavailable
        export UPKEEP_ARTIFACT_EXPIRES_AT="$EXP"
        SYN="${{ inputs.target }}/synthesis.json"; [ -f "$SYN" ] || SYN="-"
        "$ROOT/node_modules/.bin/tsx" "$ROOT/src/report.ts" \
          "${{ inputs.target }}/findings" "$SYN" \
          "${{ runner.temp }}/_ignore.html" "${{ runner.temp }}/issue.md" \
          "${{ inputs.target }}/inventory.json"
    - name: upsert tracking issue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        ROOT="${{ github.action_path }}/../../.."
        # ensure the label exists (gh issue create fails if the label is missing)
        gh label create "${{ inputs.issue_label }}" --color FBCA04 --description "repo audit findings" --force >/dev/null 2>&1 || true
        gh issue list --state open --label "${{ inputs.issue_label }}" --json number,body > "${{ runner.temp }}/issues.json" || echo '[]' > "${{ runner.temp }}/issues.json"
        NUM="$("$ROOT/node_modules/.bin/tsx" "$ROOT/src/find-issue.ts" "${{ runner.temp }}/issues.json")"
        if [ -n "$NUM" ]; then
          gh issue edit "$NUM" --body-file "${{ runner.temp }}/issue.md"
        else
          gh issue create --title "🔍 Upkeep Report" --label "${{ inputs.issue_label }}" --body-file "${{ runner.temp }}/issue.md"
        fi
